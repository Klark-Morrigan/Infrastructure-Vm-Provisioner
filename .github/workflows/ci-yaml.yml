# CI for this repo's YAML surfaces. Delegates to the reusable workflow
# in Common-Automation, which runs three cross-cutting lint jobs in
# parallel: actionlint, action-validator, yamllint. Each job auto-skips
# when its target surface is absent, so a repo gets workflow/YAML
# linting at no extra cost. Ansible linting is no longer part of this
# workflow - the domain gate now comes from Common-Ansible's
# ci-ansible.yml (wired via this repo's ci-ansible.yml).
name: Common-Automation

on:
  pull_request:
  workflow_dispatch:

jobs:
  ci-yaml:
    uses: Klark-Morrigan/Common-Automation/.github/workflows/ci-yaml.yml@master
