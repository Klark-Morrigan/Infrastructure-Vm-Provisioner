name: Infrastructure-E2E

# Calls the shared E2E workflow in Infrastructure-E2E as a required PR check.
# Always runs the full lifecycle layer - a provisioner change can cascade to
# break user setup or runner registration, so the full stack must be verified.
on:
  pull_request:

jobs:
  e2e:
    uses: Klark-Morrigan/Infrastructure-E2E/.github/workflows/e2e.yml@master
    # Exercise this repo's own toolchain path (the Ansible flow) on every PR:
    # toolchainsFlow=ansible drives provision -SkipToolchains + the standalone
    # provision-toolchains.sh, the way this repo now installs toolchains.
    # users/runners stay on their ansible defaults.
    with:
      flow-spec: '{"usersFlow":"ansible","runnersFlow":"ansible","toolchainsFlow":"custom-powershell"}'
    secrets: inherit
