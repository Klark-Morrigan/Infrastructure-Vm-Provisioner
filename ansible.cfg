# Lint-support shim. This repo's Ansible implementation is nested under
# hyper-v/ubuntu/Ansible/ (the by-impl repo layout). Unlike the other
# consumers it ships NO roles of its own - its single playbook
# (hyper-v/ubuntu/Ansible/playbooks/provision-toolchains.yml) statically
# import_roles the Common-Ansible substrate roles (jdk, dotnet_sdk,
# dotnet_tools). The fleet-wide ansible-lint CI gate only activates when
# ansible.cfg / playbooks/ / roles/ exists at the repo ROOT, so this file
# exists solely to STOP the gate auto-skipping this repo, and it lints with
# --project-dir = repo root.
#
# Role resolution during the lint pass does NOT come from here. Because the
# composed roles are substrate (not present in this repo), the ci-ansible
# reusable workflow's substrate-composer branch puts the staged substrate
# roles/ on ANSIBLE_ROLES_PATH - the caller's ci-ansible.yml passes
# composes-substrate-roles: true. A roles_path set here would be clobbered
# by that env var anyway, so none is set; an empty [defaults] section is all
# that is needed to trigger activation.
#
# It is NOT used at runtime: the Ansible flow runs through the Common-Ansible
# substrate bridge, which cd's to the SUBSTRATE root and uses the substrate's
# own ansible.cfg. This shim only affects ansible/ansible-lint invoked from
# this repo's root (i.e. the CI lint pass).
[defaults]
